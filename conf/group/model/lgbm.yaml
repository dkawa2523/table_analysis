# モデルバリアント: LightGBM（optional dependency: uv sync --extra models）
model_variant:
  name: lgbm
  framework: lightgbm
  class_path:
    regression: lightgbm.LGBMRegressor
    classification: lightgbm.LGBMClassifier
  params:
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 31
    random_state: ${eval.seed}
