# モデルバリアント: GradientBoosting（scikit-learn）
model_variant:
  name: gradient_boosting
  framework: sklearn
  class_path:
    regression: sklearn.ensemble.GradientBoostingRegressor
    classification: sklearn.ensemble.GradientBoostingClassifier
  params:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 3
    min_samples_leaf: 2
    random_state: ${eval.seed}
