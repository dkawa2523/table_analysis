# モデルバリアント: ExtraTrees（scikit-learn）
model_variant:
  name: extra_trees
  framework: sklearn
  class_path:
    regression: sklearn.ensemble.ExtraTreesRegressor
    classification: sklearn.ensemble.ExtraTreesClassifier
  params:
    n_estimators: 100
    max_depth: 8
    min_samples_leaf: 2
    random_state: ${eval.seed}
