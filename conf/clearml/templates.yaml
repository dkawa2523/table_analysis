version: 1

templates:
  dataset_register:
    project_name: "{project_root}/{solution_root}/{templates_root_group}/{step_templates_group}/{group_map[dataset_register]}"
    task_name_template: "dataset_register"
    entrypoint: "python tools/clearml_entrypoint.py task=dataset_register"
    default_overrides:
      - "run.clearml.enabled=true"
      - "run.clearml.execution=logging"
      - "run.clearml.env.bootstrap=uv"
    requirements:
      - "clearml>=1.15.0"
      - "uv>=0.5.0"
    tags:
      - "template:true"
      - "task_kind:template"
      - "template_set:{template_set_id}"
      - "usecase:{usecase_id}"
      - "process:dataset_register"
      - "schema:{schema_version}"
      - "solution:tabular-analysis"
    properties_minimal:
      usecase_id: "{usecase_id}"
      process: "dataset_register"
      schema_version: "{schema_version}"
      project_root: "{project_root}"
      template_set_id: "{template_set_id}"
      task_kind: "template"

  preprocess:
    project_name: "{project_root}/{solution_root}/{templates_root_group}/{step_templates_group}/{group_map[preprocess]}"
    task_name_template: "preprocess"
    entrypoint: "python tools/clearml_entrypoint.py task=preprocess"
    default_overrides:
      - "run.clearml.enabled=true"
      - "run.clearml.execution=logging"
      - "run.clearml.env.bootstrap=uv"
    requirements:
      - "clearml>=1.15.0"
      - "uv>=0.5.0"
    tags:
      - "template:true"
      - "task_kind:template"
      - "template_set:{template_set_id}"
      - "usecase:{usecase_id}"
      - "process:preprocess"
      - "schema:{schema_version}"
      - "solution:tabular-analysis"
    properties_minimal:
      usecase_id: "{usecase_id}"
      process: "preprocess"
      schema_version: "{schema_version}"
      project_root: "{project_root}"
      template_set_id: "{template_set_id}"
      task_kind: "template"

  train_model:
    project_name: "{project_root}/{solution_root}/{templates_root_group}/{step_templates_group}/{group_map[train_model]}"
    task_name_template: "train_model"
    entrypoint: "python tools/clearml_entrypoint.py task=train_model"
    default_overrides:
      - "run.clearml.enabled=true"
      - "run.clearml.execution=logging"
      - "run.clearml.env.bootstrap=uv"
    requirements:
      - "clearml>=1.15.0"
      - "uv>=0.5.0"
    tags:
      - "template:true"
      - "task_kind:template"
      - "template_set:{template_set_id}"
      - "usecase:{usecase_id}"
      - "process:train_model"
      - "schema:{schema_version}"
      - "solution:tabular-analysis"
    properties_minimal:
      usecase_id: "{usecase_id}"
      process: "train_model"
      schema_version: "{schema_version}"
      project_root: "{project_root}"
      template_set_id: "{template_set_id}"
      task_kind: "template"

  train_ensemble:
    project_name: "{project_root}/{solution_root}/{templates_root_group}/{step_templates_group}/{group_map[train_ensemble]}"
    task_name_template: "train_ensemble"
    entrypoint: "python tools/clearml_entrypoint.py task=train_ensemble"
    default_overrides:
      - "run.clearml.enabled=true"
      - "run.clearml.execution=logging"
      - "run.clearml.env.bootstrap=uv"
    requirements:
      - "clearml>=1.15.0"
      - "uv>=0.5.0"
    tags:
      - "template:true"
      - "task_kind:template"
      - "template_set:{template_set_id}"
      - "usecase:{usecase_id}"
      - "process:train_ensemble"
      - "schema:{schema_version}"
      - "solution:tabular-analysis"
    properties_minimal:
      usecase_id: "{usecase_id}"
      process: "train_ensemble"
      schema_version: "{schema_version}"
      project_root: "{project_root}"
      template_set_id: "{template_set_id}"
      task_kind: "template"

  train_model_full:
    project_name: "{project_root}/{solution_root}/{pipeline_seed_namespace}/train_model_full"
    task_name_template: "train_model_full"
    entrypoint: "python tools/clearml_entrypoint.py task=pipeline"
    default_overrides:
      - "run.clearml.enabled=true"
      - "run.clearml.execution=pipeline_controller"
      - "run.clearml.env.bootstrap=uv"
      - "pipeline.model_set=regression_all"
      - "pipeline.run_dataset_register=false"
      - "pipeline.run_preprocess=true"
      - "pipeline.run_train=true"
      - "pipeline.run_train_ensemble=false"
      - "pipeline.run_leaderboard=false"
      - "pipeline.run_infer=false"
      - "ensemble.enabled=false"
    requirements:
      - "clearml>=1.15.0"
      - "uv>=0.5.0"
    tags:
      - "template_set:{template_set_id}"
      - "usecase:{usecase_id}"
      - "process:pipeline"
      - "schema:{schema_version}"
      - "solution:tabular-analysis"
      - "task_kind:seed"
      - "pipeline_profile:train_model_full"
    properties_minimal:
      usecase_id: "{usecase_id}"
      process: "pipeline"
      schema_version: "{schema_version}"
      project_root: "{project_root}"
      template_set_id: "{template_set_id}"
      task_kind: "seed"
      pipeline_profile: "train_model_full"

  train_ensemble_full:
    project_name: "{project_root}/{solution_root}/{pipeline_seed_namespace}/train_ensemble_full"
    task_name_template: "train_ensemble_full"
    entrypoint: "python tools/clearml_entrypoint.py task=pipeline"
    default_overrides:
      - "run.clearml.enabled=true"
      - "run.clearml.execution=pipeline_controller"
      - "run.clearml.env.bootstrap=uv"
      - "pipeline.model_set=regression_all"
      - "pipeline.run_dataset_register=false"
      - "pipeline.run_preprocess=true"
      - "pipeline.run_train=true"
      - "pipeline.run_train_ensemble=true"
      - "pipeline.run_leaderboard=true"
      - "pipeline.run_infer=false"
      - "ensemble.enabled=true"
      - "ensemble.top_k=0"
      - "ensemble.methods=[mean_topk,weighted,stacking]"
      - "ensemble.weighted.top_k_max=0"
    requirements:
      - "clearml>=1.15.0"
      - "uv>=0.5.0"
    tags:
      - "template_set:{template_set_id}"
      - "usecase:{usecase_id}"
      - "process:pipeline"
      - "schema:{schema_version}"
      - "solution:tabular-analysis"
      - "task_kind:seed"
      - "pipeline_profile:train_ensemble_full"
    properties_minimal:
      usecase_id: "{usecase_id}"
      process: "pipeline"
      schema_version: "{schema_version}"
      project_root: "{project_root}"
      template_set_id: "{template_set_id}"
