services:
  clearml-controller:
    build:
      context: .
      dockerfile: Dockerfile
    image: table-analysis-clearml-agent:latest
    container_name: clearml-controller
    restart: unless-stopped
    environment:
      CLEARML_API_HOST: ${CLEARML_API_HOST:-http://apiserver:8008}
      CLEARML_FILES_HOST: ${CLEARML_FILES_HOST:-http://clearml-fileserver:8081}
      CLEARML_WEB_HOST: ${CLEARML_WEB_HOST:-http://webserver:80}
      CLEARML_API_ACCESS_KEY: ${CLEARML_API_ACCESS_KEY:?set CLEARML_API_ACCESS_KEY}
      CLEARML_API_SECRET_KEY: ${CLEARML_API_SECRET_KEY:?set CLEARML_API_SECRET_KEY}
      UV_CACHE_DIR: /root/.clearml/uv-cache
    volumes:
      - clearml-controller-home:/root/.clearml
      - clearml-uv-cache:/root/.clearml/uv-cache
    command: ["clearml-agent", "daemon", "--queue", "controller"]

  clearml-default:
    image: table-analysis-clearml-agent:latest
    container_name: clearml-default
    restart: unless-stopped
    depends_on:
      - clearml-controller
    environment:
      CLEARML_API_HOST: ${CLEARML_API_HOST:-http://apiserver:8008}
      CLEARML_FILES_HOST: ${CLEARML_FILES_HOST:-http://clearml-fileserver:8081}
      CLEARML_WEB_HOST: ${CLEARML_WEB_HOST:-http://webserver:80}
      CLEARML_API_ACCESS_KEY: ${CLEARML_API_ACCESS_KEY:?set CLEARML_API_ACCESS_KEY}
      CLEARML_API_SECRET_KEY: ${CLEARML_API_SECRET_KEY:?set CLEARML_API_SECRET_KEY}
      UV_CACHE_DIR: /root/.clearml/uv-cache
    volumes:
      - clearml-default-home:/root/.clearml
      - clearml-uv-cache:/root/.clearml/uv-cache
    command: ["clearml-agent", "daemon", "--queue", "default"]

  clearml-heavy-model:
    image: table-analysis-clearml-agent:latest
    container_name: clearml-heavy-model
    restart: unless-stopped
    depends_on:
      - clearml-controller
    environment:
      CLEARML_API_HOST: ${CLEARML_API_HOST:-http://apiserver:8008}
      CLEARML_FILES_HOST: ${CLEARML_FILES_HOST:-http://clearml-fileserver:8081}
      CLEARML_WEB_HOST: ${CLEARML_WEB_HOST:-http://webserver:80}
      CLEARML_API_ACCESS_KEY: ${CLEARML_API_ACCESS_KEY:?set CLEARML_API_ACCESS_KEY}
      CLEARML_API_SECRET_KEY: ${CLEARML_API_SECRET_KEY:?set CLEARML_API_SECRET_KEY}
      UV_CACHE_DIR: /root/.clearml/uv-cache
    volumes:
      - clearml-heavy-model-home:/root/.clearml
      - clearml-uv-cache:/root/.clearml/uv-cache
    command: ["clearml-agent", "daemon", "--queue", "heavy-model"]

networks:
  default:
    external: true
    name: docker_backend

volumes:
  clearml-controller-home:
  clearml-default-home:
  clearml-heavy-model-home:
  clearml-uv-cache:
